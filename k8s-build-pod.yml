apiVersion: v1
kind: Pod
metadata:
  labels:
    jobName: simple-python-pyinstaller-build
  annotations:
    karpenter.sh/do-not-disrupt: "true"
spec:
  containers:
    - name: python
      image: python:3.11-alpine
      command:
        - cat
      tty: true
      resources:
        requests:
          cpu: 250m
          memory: 256M
        limits:
          cpu: 500m
          memory: 512M

    - name: snyk
      image: snyk/snyk:alpine
      command: ['cat']
      tty: true
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 1000m
          memory: 2Gi

  serviceAccountName: jenkins
